<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim — Desk Collection Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1a2744;--bg:#f4f5f7;--surface:#ffffff;--surface2:#f0f2f5;
  --border:#e4e7ec;--text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --accent:#1d60c8;--accent-bg:#eef3fd;
  --success:#059669;--success-bg:#ecfdf5;
  --warning:#d97706;--warning-bg:#fffbeb;
  --danger:#dc2626;--danger-bg:#fef2f2;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,0.07);--shadow-md:0 4px 12px rgba(0,0,0,0.1);
  --sidebar-w:220px;
}
[data-theme="dark"]{
  --navy:#0f1523;--bg:#0a0d14;--surface:#131825;--surface2:#1a2035;
  --border:#252d42;--text:#f1f3f9;--text2:#9aa5be;--text3:#4a5568;
  --accent:#4a8cf7;--accent-bg:#1a2540;
  --success:#34d399;--success-bg:#0d2e22;
  --warning:#fbbf24;--warning-bg:#2d200a;
  --danger:#f87171;--danger-bg:#2d0f0f;
  --shadow:0 1px 3px rgba(0,0,0,0.4);--shadow-md:0 4px 12px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.navbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 calc(var(--sidebar-w)+20px);z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.nav-logo{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.theme-toggle{display:flex;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-sm);overflow:hidden;}
.theme-btn{padding:5px 10px;font-size:12px;color:rgba(255,255,255,0.5);cursor:pointer;border:none;background:none;}
.theme-btn.active{background:rgba(255,255,255,0.2);color:#fff;}
.sidebar{position:fixed;top:52px;left:0;width:var(--sidebar-w);height:calc(100vh - 52px);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:100;}
.sidebar-section{padding:16px 12px 8px;}
.sidebar-section-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:0 6px;margin-bottom:6px;}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;text-decoration:none;margin-bottom:2px;}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{background:var(--accent-bg);color:var(--accent);}
.sidebar-item .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sidebar-item .icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.sidebar-divider{height:1px;background:var(--border);margin:8px 12px;}
.main{margin-left:var(--sidebar-w);margin-top:52px;padding:28px;min-height:calc(100vh - 52px);}

/* FILTER */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;box-shadow:var(--shadow);}
.filter-bar label{font-size:12px;color:var(--text3);font-weight:500;}
select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;cursor:pointer;outline:none;}
select:focus{border-color:var(--accent);}
.filter-sep{flex:1;}
.btn-load{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;}
.btn-load:disabled{opacity:.5;cursor:not-allowed;}

/* =========== SPV CARD GRID (view awal) =========== */
.spv-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.spv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s;overflow:hidden;}
.spv-card:hover{box-shadow:var(--shadow-md);border-color:var(--accent);transform:translateY(-2px);}
.spv-card-header{padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.spv-card-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0;}
.spv-card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.spv-card-meta{font-size:11px;color:var(--text3);}
.spv-card-body{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.spv-card-stat{text-align:center;}
.spv-card-stat .sv{font-size:14px;font-weight:700;color:var(--text);display:block;}
.spv-card-stat .sk{font-size:10px;color:var(--text3);display:block;margin-top:1px;}
.spv-card-footer{padding:10px 18px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.spv-card-apps{font-size:11px;color:var(--text3);}
.spv-card-arrow{font-size:12px;color:var(--accent);font-weight:500;}

/* BACK BUTTON */
.back-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.btn-back{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;}
.btn-back:hover{background:var(--surface2);color:var(--text);border-color:var(--accent);}
.back-title{font-size:16px;font-weight:700;color:var(--text);}

/* SPV BLOCK (detail view) */
.spv-list{display:flex;flex-direction:column;gap:20px;}
.spv-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.spv-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.spv-header-left{display:flex;align-items:center;gap:12px;}
.spv-avatar{width:42px;height:42px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0;}
.spv-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;}
.spv-meta{font-size:11px;color:var(--text3);}
.spv-header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pill-blue{background:var(--accent-bg);color:var(--accent);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block;}

/* SETUP TABS */
.setup-bar{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.setup-tab{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;}
.setup-tab:hover{border-color:var(--accent);color:var(--accent);}
.setup-tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.setup-tab-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0;}
.setup-tab-del:hover{color:var(--danger);}
.btn-add-setup{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius-sm);border:1px dashed var(--border);background:none;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;}
.btn-add-setup:hover{border-color:var(--accent);color:var(--accent);}

/* FIXED METRIC BOXES */
.spv-metrics-grid{padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;border-bottom:1px solid var(--border);}
.metric-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;transition:opacity .15s;}
.metric-box .lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.metric-box .val{font-size:15px;font-weight:700;color:var(--text);}
.metric-box .sub{font-size:10px;color:var(--text3);margin-top:2px;}
.metric-box.accent{border:1px solid var(--accent);}
.metric-box.accent .val{color:var(--accent);}

/* BUCKET GROUP */
.bucket-group{border-bottom:1px solid var(--border);}
.bucket-group:last-child{border-bottom:none;}
.bucket-header{padding:8px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.bucket-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
.bucket-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--border);color:var(--text2);font-weight:500;}

/* TL ROW */
.tl-row{border-bottom:1px solid var(--border);}
.tl-row:last-child{border-bottom:none;}
.tl-header{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;transition:background .1s;}
.tl-header:hover{background:var(--surface2);}
.tl-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.r1{background:#FEF3C7;color:#92400E;}
.r2{background:#F1F5F9;color:#475569;}
.r3{background:#FEE2E2;color:#7F1D1D;}
.rn{background:var(--surface2);color:var(--text3);}
.tl-name{font-size:13px;font-weight:600;color:var(--accent);flex:1;min-width:0;}
.tl-stats{display:flex;gap:16px;flex-shrink:0;flex-wrap:wrap;}
.tl-stat{font-size:11px;color:var(--text2);text-align:right;}
.tl-stat .sv{font-weight:600;color:var(--text);display:block;}
.tl-stat .sk{font-size:10px;color:var(--text3);}
.tl-toggle{font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.tl-toggle.open{transform:rotate(180deg);}
.tl-setup-tabs{display:flex;gap:4px;flex-shrink:0;flex-wrap:nowrap;}
.tl-setup-tab{padding:3px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tl-setup-tab:hover{border-color:var(--accent);color:var(--accent);}
.tl-setup-active{background:var(--accent-bg)!important;border-color:var(--accent)!important;color:var(--accent)!important;}

/* AGENT TABLE */
.agent-detail{display:none;border-top:1px solid var(--border);}
.agent-detail.open{display:block;}
.agent-detail-inner{overflow-x:auto;}
.agent-table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap;}
.agent-table th{text-align:left;padding:8px 14px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0;}
.agent-table td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text2);}
.agent-table tr:last-child td{border-bottom:none;}
.agent-table tr.agent-row:hover td{background:var(--surface2);}
.agent-link{color:var(--accent);text-decoration:none;font-weight:500;cursor:pointer;}
.agent-link:hover{text-decoration:underline;}
.num{color:var(--text);font-weight:500;}
.absensi-pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;}
.ab-hadir{background:var(--success-bg);color:var(--success);}
.ab-off{background:var(--surface2);color:var(--text3);}

/* AGENT INLINE PREVIEW */
.agent-preview-row td{padding:0!important;border-bottom:1px solid var(--border);}
.agent-preview{display:none;background:var(--surface);border-top:2px solid var(--accent);}
.agent-preview.open{display:block;}
.agent-preview-inner{padding:14px 18px;}
.agent-preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.agent-preview-name{font-size:14px;font-weight:700;color:var(--text);}
.agent-preview-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.btn-close-preview{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 10px;font-size:11px;color:var(--text2);cursor:pointer;}
.btn-close-preview:hover{background:var(--surface2);}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px;}
.preview-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;}
.preview-stat .lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;margin-bottom:3px;}
.preview-stat .val{font-size:14px;font-weight:700;color:var(--text);}
.preview-daily{overflow-x:auto;margin-top:8px;}
.preview-daily-table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;}
.preview-daily-table th{padding:5px 10px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);background:var(--surface2);text-align:left;}
.preview-daily-table td{padding:5px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
.preview-daily-table tr:last-child td{border-bottom:none;}
.preview-link{display:inline-block;margin-top:10px;font-size:12px;color:var(--accent);text-decoration:none;font-weight:500;}
.preview-link:hover{text-decoration:underline;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:460px;box-shadow:var(--shadow-md);max-height:90vh;display:flex;flex-direction:column;}
.modal-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px 6px;border-radius:4px;}
.modal-close:hover{background:var(--surface2);}
.modal-name-row{padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-name-row label{font-size:12px;color:var(--text3);font-weight:500;display:block;margin-bottom:6px;}
.modal-name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:14px;outline:none;}
.modal-name-input:focus{border-color:var(--accent);}
.modal-body{padding:14px 18px;overflow-y:auto;flex:1;}
.metric-toggle{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:background .1s;}
.metric-toggle:hover{background:var(--surface2);}
.metric-toggle input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;color:var(--text2);cursor:pointer;}

/* STATE */
.state-box{text-align:center;padding:60px 20px;color:var(--text3);}
.state-box .icon{font-size:36px;margin-bottom:12px;}
.state-box p{font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:768px){:root{--sidebar-w:0px;}.sidebar{display:none;}.navbar{padding-left:20px;}.main{margin-left:0;}}
.spv-block,.spv-card{transition:box-shadow .15s,border-color .15s;}
.tl-header{transition:background .1s;}
.setup-tab,.tl-setup-tab{transition:all .15s;}
.metric-box{transition:opacity .12s;}
.sidebar-item{transition:background .12s,color .12s;}

/* CATATAN SPV DOT */
.catatan-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#f59e0b;margin-left:5px;vertical-align:middle;flex-shrink:0;cursor:default;}

/* ROTATION LABELS */
.label-pengganti{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;background:#dbeafe;color:#1d4ed8;margin-left:6px;vertical-align:middle;white-space:nowrap;}
.label-pindah{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;background:#fef3c7;color:#92400e;margin-left:6px;vertical-align:middle;white-space:nowrap;}
.label-nonaktif{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;background:#f3f4f6;color:#6b7280;margin-left:6px;vertical-align:middle;white-space:nowrap;}
.agent-row.rotasi-lama td{opacity:0.5;}
.agent-row.rotasi-lama td:first-child{opacity:1;}

/* BUCKET ANALYSIS PANEL */
.bucket-analysis-wrap{border-top:1px solid var(--border);background:var(--surface);padding:14px 18px 18px;}
.bucket-analysis-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.bucket-analysis-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.5fr);gap:14px;}
@media(max-width:900px){.bucket-analysis-grid{grid-template-columns:1fr;}}
.bucket-filter-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.bucket-filter-row label{font-size:11px;color:var(--text3);font-weight:500;}
.bucket-filter-row select{font-size:12px;padding:5px 9px;}
.bucket-filter-row label{font-size:12px;color:var(--text3);font-weight:500;white-space:nowrap;}
.attention-list{display:flex;flex-direction:column;gap:6px;}
.attention-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:border-color .15s;}
.attention-item:hover{border-color:var(--accent);}
.attention-item.selected{border-color:var(--accent);background:var(--accent-bg);}
.attention-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.av-danger{background:var(--danger-bg);color:var(--danger);}
.av-warning{background:var(--warning-bg);color:var(--warning);}
.av-ok{background:var(--success-bg);color:var(--success);}
.attention-info{flex:1;min-width:0;}
.attention-name{font-size:12px;font-weight:600;color:var(--text);}
.attention-sub{font-size:10px;color:var(--text3);}
.risk-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.risk-kritis{background:var(--danger-bg);color:var(--danger);}
.risk-waspada{background:var(--warning-bg);color:var(--warning);}
.risk-score-num{font-size:15px;font-weight:700;flex-shrink:0;}
.analysis-panel{background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 14px;overflow-y:auto;max-height:600px;}
.bucket-summary-panel{background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;}
.bucket-sum-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.bucket-sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.bucket-sum-stat{background:var(--surface);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--border);}
.bucket-sum-stat .lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.bucket-sum-stat .val{font-size:14px;font-weight:700;color:var(--text);}
.bucket-sum-stat .sub{font-size:10px;color:var(--text3);margin-top:1px;}
.bucket-sum-stat.accent .val{color:var(--accent);}
.bucket-sum-stat.good .val{color:var(--success);}
.bucket-sum-stat.warn .val{color:var(--warning);}
.bucket-sum-stat.bad .val{color:var(--danger);}
.bucket-rank-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);margin-bottom:4px;}
.bucket-rank-medal{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.medal-1{background:#FEF3C7;color:#92400E;} .medal-2{background:#F1F5F9;color:#475569;} .medal-3{background:#FEE2E2;color:#7F1D1D;} .medal-n{background:var(--surface2);color:var(--text3);}
.bucket-rank-name{font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bucket-rank-val{font-size:12px;font-weight:600;color:var(--success);flex-shrink:0;}
.bucket-rank-badge{font-size:10px;padding:1px 6px;border-radius:10px;flex-shrink:0;}
.badge-top{background:var(--success-bg);color:var(--success);}
.badge-low{background:var(--danger-bg);color:var(--danger);}
.insight-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;}
.insight-box-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.insight-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;font-size:11px;color:var(--text2);line-height:1.5;}
.insight-item:last-child{margin-bottom:0;}
.insight-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.dot-green{background:var(--success);} .dot-warn{background:var(--warning);} .dot-red{background:var(--danger);} .dot-blue{background:var(--accent);}
.divider-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin:10px 0 6px;display:flex;align-items:center;gap:6px;}
.divider-label::after{content:'';flex:1;height:1px;background:var(--border);}
.analysis-empty{color:var(--text3);font-size:12px;text-align:center;padding:30px 0;}
.analysis-agent-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.analysis-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.analysis-stat{background:var(--surface);border-radius:var(--radius-sm);padding:7px 9px;border:1px solid var(--border);}
.analysis-stat .lbl{font-size:10px;color:var(--text3);margin-bottom:2px;}
.analysis-stat .val{font-size:14px;font-weight:700;color:var(--text);}
.analysis-stat .val.bad{color:var(--danger);}
.analysis-stat .val.ok{color:var(--warning);}
.analysis-issue{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:9px 11px;margin-bottom:7px;}
.analysis-issue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.analysis-issue-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px;}
.analysis-metric-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:3px;}
.analysis-metric-val{font-weight:600;color:var(--text);}
.analysis-metric-val.bad{color:var(--danger);}
.analysis-metric-val.ok{color:var(--warning);}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;}
.fill-danger{background:var(--danger);}
.fill-warning{background:var(--warning);}
.fill-success{background:var(--success);}
.saran-box{background:var(--accent-bg);border:1px solid;border-color:var(--accent);border-radius:var(--radius-sm);padding:9px 11px;margin-top:8px;}
.saran-box-title{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;}
.saran-list{list-style:none;padding:0;}
.saran-list li{font-size:11px;color:var(--text);padding:2px 0;display:flex;align-items:flex-start;gap:5px;}
.saran-list li::before{content:"→";color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px;}
.no-attention{color:var(--text3);font-size:12px;padding:16px 0;text-align:center;}
.bucket-analysis-panel-wrap{min-height:80px;}
</style>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbzLOdo9BWLLMMxzRoFaPYVYClQWyIadM1bNYkVvzUCgR4TPwdlSLkXEazbDmb6ELKGN/exec';
const APP_COLORS={'GOPIN':'#1D60C8','GOPIN NURUL':'#1D60C8','GOPIN NANDALIKA':'#7C3AED','GOPIN FV':'#7C3AED','GOPIN FV NANDALIKA':'#7C3AED','PINJAMIN':'#059669','RUPIAH CEPAT':'#D97706','KREDIONE':'#DB2777','KREDITOK':'#DC2626','KREDIT OK':'#DC2626'};
function getColor(ap){const k=String(ap||'').toUpperCase().trim();for(const key of Object.keys(APP_COLORS)){if(k===key||k.startsWith(key)||key.startsWith(k))return APP_COLORS[key];}return'#6366f1';}
// getColor defined above with APP_COLORS

const ALL_METRICS=[
  {key:'dailyPayment',label:'Daily Payment',fmt:'rp'},
  {key:'avgRate',label:'Rate (%)',fmt:'rate'},
  {key:'jmlDataBayar',label:'Data Bayar',fmt:'num'},
  {key:'callManual',label:'Call Manual',fmt:'num'},
  {key:'callTerhubung',label:'Call Terhubung',fmt:'num'},
  {key:'sentuhWA',label:'Sentuh WA',fmt:'num'},
  {key:'responWA',label:'Respon WA',fmt:'num'},
  {key:'sentuhGojek',label:'Sentuh Gojek',fmt:'num'},
  {key:'responGojek',label:'Respon Gojek',fmt:'num'},
  {key:'sentuhWABA',label:'Sentuh WABA',fmt:'num'},
  {key:'responWABA',label:'Respon WABA',fmt:'num'},
  {key:'smsManual',label:'SMS Manual',fmt:'num'},
  {key:'autocall',label:'Autocall',fmt:'num'},
  {key:'waBlokir',label:'WA Blokir',fmt:'num'},
  {key:'ptp',label:'PTP',fmt:'num'},
  {key:'ptpBayar',label:'PTP Bayar',fmt:'num'},
  {key:'paymentOvertime',label:'Payment Overtime',fmt:'rp'},
  {key:'totalData',label:'Total Data',fmt:'num'},
  {key:'dataBaru',label:'Data Baru',fmt:'num'},
  {key:'osDataBaru',label:'OS Data Baru',fmt:'rp'},
];

function getSetups(spv){try{const r=localStorage.getItem('dca_setups_'+spv);if(r)return JSON.parse(r);}catch(e){}return[];}
function saveSetups(spv,s){localStorage.setItem('dca_setups_'+spv,JSON.stringify(s));}
function getActiveIdx(spv){try{const r=localStorage.getItem('dca_active_'+spv);if(r!==null)return parseInt(r);}catch(e){}return 0;}
function setActiveIdx(spv,i){localStorage.setItem('dca_active_'+spv,String(i));}

let allRows=[], allBucketMap={}, currentModalSpv=null, currentModalEditIdx=null;
// VIEW STATE: null = kartu SPV, string = detail satu SPV
let currentSpvView=null;

function fmtRp(n){if(!n||n===0)return 'Rp 0';if(n>=1e9)return 'Rp '+(n/1e9).toFixed(2)+' M';if(n>=1e6)return 'Rp '+(n/1e6).toFixed(1)+' jt';if(n>=1e3)return 'Rp '+(n/1e3).toFixed(0)+' rb';return 'Rp '+Math.round(n).toLocaleString('id-ID');}
function fmtNum(n){return n?Math.round(n).toLocaleString('id-ID'):'0';}
function fmtRate(n){return n?(n*100).toFixed(2)+'%':'0%';}
function fmtMetric(m,val){if(!m)return String(val);if(m.fmt==='rp')return fmtRp(val);if(m.fmt==='rate')return fmtRate(val);return fmtNum(val);}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('dca_theme',t);document.getElementById('btnTerang').classList.toggle('active',t==='light');document.getElementById('btnGelap').classList.toggle('active',t==='dark');}
(function(){const t=localStorage.getItem('dca_theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('btnTerang').classList.toggle('active',t==='light');document.getElementById('btnGelap').classList.toggle('active',t==='dark');})();
(function(){
  const now=new Date();
  const bl=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  document.getElementById('selBulan').value=bl[now.getMonth()];
  document.getElementById('selTahun').value=String(now.getFullYear());
  const p=new URLSearchParams(window.location.search);
  if(p.get('bulan'))document.getElementById('selBulan').value=p.get('bulan');
  if(p.get('tahun'))document.getElementById('selTahun').value=p.get('tahun');
})();

function buildBucketMap(rows){allBucketMap={};rows.forEach(r=>{const ap=r.aplikasi||'';const bk=r.bucket||'';if(ap&&bk){if(!allBucketMap[ap])allBucketMap[ap]=new Set();allBucketMap[ap].add(bk);}});Object.keys(allBucketMap).forEach(ap=>{allBucketMap[ap]=[...allBucketMap[ap]].sort();});}
function populateAplikasi(rows){const list=[...new Set(rows.map(r=>r.aplikasi).filter(Boolean))].sort();document.getElementById('selAplikasi').innerHTML='<option value="">Semua</option>'+list.map(a=>`<option value="${a}">${a}</option>`).join('');}
function populateBucket(ap){let b=[];if(ap&&allBucketMap[ap]){b=allBucketMap[ap];}else{const all=new Set();Object.values(allBucketMap).forEach(x=>x.forEach(v=>all.add(v)));b=[...all].sort();}document.getElementById('selBucket').innerHTML='<option value="">Semua</option>'+b.map(x=>`<option value="${x}">${x}</option>`).join('');}
function onAplikasiChange(){populateBucket(document.getElementById('selAplikasi').value);}
function getFilteredRows(){const ap=document.getElementById('selAplikasi').value;const bk=document.getElementById('selBucket').value;let rows=allRows;if(ap)rows=rows.filter(r=>r.aplikasi===ap);if(bk)rows=rows.filter(r=>r.bucket===bk);return rows;}

function clearCache(){try{Object.keys(sessionStorage).filter(k=>k.startsWith('dca_c_')).forEach(k=>sessionStorage.removeItem(k));}catch(e){}}
async function fetchJSON(url, useCache=true){
  function _hash(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return(h>>>0).toString(36);}
  const cacheKey='dca_c_'+_hash(url.split('?')[1]||url);
  if(useCache){
    try{
      const cached=sessionStorage.getItem(cacheKey);
      if(cached){const {data,ts}=JSON.parse(cached);if(Date.now()-ts<300000)return data;}
    }catch(e){}
  }
  const res=await fetch(url);const text=await res.text();
  let data;
  if(text.trim().charCodeAt(0)===60){await new Promise(r=>setTimeout(r,2000));data=await(await fetch(url)).json();}
  else{data=JSON.parse(text);}
  if(useCache&&data&&data.success){try{sessionStorage.setItem(cacheKey,JSON.stringify({data,ts:Date.now()}));}catch(e){}}
  return data;
}

async function loadData(){
  const bulan=document.getElementById('selBulan').value;const tahun=document.getElementById('selTahun').value;
  const btn=document.getElementById('btnLoad');btn.disabled=true;btn.textContent='⏳ Memuat...';
  document.getElementById('content').innerHTML='<div class="state-box"><div class="spinner"></div><p>Memuat data...</p></div>';
  try{
    const data=await fetchJSON(API_URL+'?action=agentdata&bulan='+bulan+'&tahun='+tahun);
    if(!data.success)throw new Error(data.message);
    allRows=data.rows||[];
    buildBucketMap(allRows);populateAplikasi(allRows);populateBucket('');
    renderSidebar(allRows,bulan,tahun);
    // Reset ke view kartu SPV setiap kali load data baru
    currentSpvView=null;
    renderAll();
  }catch(e){document.getElementById('content').innerHTML='<div class="state-box"><div class="icon">⚠️</div><p>'+escH(e.message)+'</p></div>';}
  btn.disabled=false;btn.textContent='Tampilkan';
}

function renderSidebar(rows,bulan,tahun){
  const apps=[...new Set(rows.map(r=>r.aplikasi).filter(Boolean))].sort();
  document.getElementById('sidebarApps').innerHTML=apps.map(ap=>`<a class="sidebar-item" href="app.html?ap=${encodeURIComponent(ap)}&bulan=${encodeURIComponent(bulan)}&tahun=${tahun}"><span class="dot" style="background:${getColor(ap)}"></span>${ap.charAt(0)+ap.slice(1).toLowerCase()}</a>`).join('');
}

function summarizeRows(rows){
  if(!rows||!rows.length)return{totalData:0,dataBaru:0,osDataBaru:0,dailyPayment:0,jmlDataBayar:0,avgRate:0,paymentOvertime:0,callManual:0,callTerhubung:0,sentuhWA:0,sentuhGojek:0,responWA:0,responGojek:0,waBlokir:0,ptp:0,ptpBayar:0,sentuhWABA:0,responWABA:0,smsManual:0,responSMSManual:0,autocall:0};
  const keys=['totalData','dataBaru','osDataBaru','dailyPayment','jmlDataBayar','autocall','callManual','callTerhubung','sentuhWA','sentuhGojek','responWA','responGojek','waBlokir','ptp','ptpBayar','sentuhWABA','responWABA','smsManual','responSMSManual','paymentOvertime'];
  const r={};keys.forEach(k=>{r[k]=rows.reduce((a,x)=>a+(x[k]||0),0);});
  const tb=r.jmlDataBayar;r.avgRate=tb>0?rows.reduce((a,x)=>a+(x.rate*x.jmlDataBayar),0)/tb:rows.reduce((a,x)=>a+(x.rate||0),0)/rows.length;
  return r;
}

// ============================================================
// RENDER UTAMA: kartu SPV atau detail 1 SPV
// ============================================================
function renderAll(){
  const filtered=getFilteredRows();
  const bySPV={};
  filtered.forEach(r=>{
    const spv=r.supervisor||'(Tanpa SPV)';
    if(!bySPV[spv])bySPV[spv]=[];
    bySPV[spv].push(r);
  });
  if(!Object.keys(bySPV).length){
    document.getElementById('content').innerHTML='<div class="state-box"><div class="icon">📭</div><p>Tidak ada data.</p></div>';
    return;
  }
  if(currentSpvView && bySPV[currentSpvView]){
    renderDetailSPV(currentSpvView, bySPV[currentSpvView], bySPV);
  } else {
    currentSpvView=null;
    renderSpvCards(bySPV);
  }
}

// ============================================================
// VIEW 1: KARTU SUPERVISOR
// ============================================================
function renderSpvCards(bySPV){
  const bulan=document.getElementById('selBulan').value;
  const tahun=document.getElementById('selTahun').value;
  const spvKeys=Object.keys(bySPV).sort();
  const cards=spvKeys.map(spv=>{
    const rows=bySPV[spv];
    const s=summarizeRows(rows);
    const agentCount=new Set(rows.map(r=>r.agent)).size;
    const bucketCount=new Set(rows.map(r=>r.bucket).filter(Boolean)).size;
    const tlCount=new Set(rows.map(r=>r.teamLeader).filter(Boolean)).size;
    const appList=[...new Set(rows.map(r=>r.aplikasi).filter(Boolean))];
    const initials=spv.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    const avatarColor=appList.length===1?getColor(appList[0]):'var(--accent)';
    return `<div class="spv-card" onclick="openSpvDetail('${escA(spv)}')">
      <div class="spv-card-header">
        <div class="spv-card-avatar" style="background:${avatarColor}22;color:${avatarColor}">${escH(initials)}</div>
        <div>
          <div class="spv-card-name">${escH(spv)}</div>
          <div class="spv-card-meta">${bucketCount} bucket · ${tlCount} TL · ${agentCount} agent</div>
        </div>
      </div>
      <div class="spv-card-body">
        <div class="spv-card-stat">
          <span class="sv">${fmtRp(s.dailyPayment)}</span>
          <span class="sk">Total Payment</span>
        </div>
        <div class="spv-card-stat">
          <span class="sv">${fmtRate(s.avgRate)}</span>
          <span class="sk">Avg Rate</span>
        </div>
        <div class="spv-card-stat">
          <span class="sv">${fmtNum(s.ptp)}</span>
          <span class="sk">PTP</span>
        </div>
      </div>
      <div class="spv-card-footer">
        <span class="spv-card-apps">${appList.map(a=>a.charAt(0)+a.slice(1).toLowerCase()).join(', ')}</span>
        <span class="spv-card-arrow">Lihat detail →</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="spv-card-grid">${cards}</div>`;
}

function openSpvDetail(spv){
  currentSpvView=spv;
  renderAll();
}

function backToCards(){
  currentSpvView=null;
  renderAll();
}

// ============================================================
// VIEW 2: DETAIL SATU SPV + SEMUA TL-NYA
// ============================================================
function renderDetailSPV(spv, rows, bySPV){
  const bulan=document.getElementById('selBulan').value;
  const tahun=document.getElementById('selTahun').value;
  const container=document.getElementById('content');
  container.innerHTML='';

  // Back bar
  const backBar=document.createElement('div');
  backBar.className='back-bar';
  backBar.innerHTML=`<button class="btn-back" onclick="backToCards()">← Kembali</button><span class="back-title">Supervisor: ${escH(spv)}</span>`;
  container.appendChild(backBar);

  // SPV block
  const spvEl=document.createElement('div');
  spvEl.className='spv-list';
  spvEl.innerHTML=buildSPVBlock(spv,rows,bulan,tahun);
  container.appendChild(spvEl);
}

// ============================================================
// BUILD SPV BLOCK (HTML string)
// ============================================================
const spvSummaryCache={};
const spvAgentDataCache={}; // cache rows per spv untuk analisa attention panel

function buildSPVBlock(spv,rows,bulan,tahun){
  const s=summarizeRows(rows);
  const agentCount=new Set(rows.map(r=>r.agent)).size;
  const initials=spv.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const appList=[...new Set(rows.map(r=>r.aplikasi).filter(Boolean))].join(', ');
  const setups=getSetups(spv);
  const activeIdx=Math.max(0,Math.min(getActiveIdx(spv),setups.length-1));
  const activeSetup=setups[activeIdx]||null;
  const safeSpv=escA(spv);

  const setupTabs=setups.map((st,i)=>`<div class="setup-tab ${i===activeIdx?'active':''}" onclick="switchSetup('${safeSpv}',${i})">${escH(st.name)}<button class="setup-tab-del" onclick="event.stopPropagation();deleteSetup('${safeSpv}',${i})" title="Hapus">×</button></div>`).join('');

  const setupMetrics=activeSetup?activeSetup.metrics.map(k=>ALL_METRICS.find(m=>m.key===k)).filter(Boolean):[];
  const metricBoxes=setupMetrics.length?setupMetrics.map(m=>`<div class="metric-box"><div class="lbl">${m.label}</div><div class="val">${fmtMetric(m,s[m.key]||0)}</div></div>`).join(''):'<div style="color:var(--text3);font-size:12px;padding:6px 0">Belum ada setup. Klik "+ Setup baru".</div>';

  // Group TL by bucket
  const byBucket={};
  rows.forEach(r=>{
    const bk=r.bucket||'(Tanpa Bucket)';
    const tl=r.teamLeader||'(Tanpa TL)';
    if(!byBucket[bk])byBucket[bk]={};
    if(!byBucket[bk][tl])byBucket[bk][tl]=[];
    byBucket[bk][tl].push(r);
  });

  // ============================================================
  // FIX BUG #2: ID TL menggunakan counter unik per-render,
  // bukan btoa yang bisa menghasilkan ID identik atau bentrok.
  // ============================================================
  let tlCounter=0;
  const bucketBlocks=Object.keys(byBucket).sort().map(bk=>{
    const tlsInBucket=Object.keys(byBucket[bk]).map(tl=>{
      const ts=summarizeRows(byBucket[bk][tl]);
      return{tl,s:ts,rows:byBucket[bk][tl],agentCount:new Set(byBucket[bk][tl].map(r=>r.agent)).size};
    }).sort((a,b)=>b.s.dailyPayment-a.s.dailyPayment);

    const tlRows=tlsInBucket.map((t,rankInBucket)=>{
      // ID unik berdasarkan counter — tidak akan pernah bentrok
      const tlId='tl'+String(++tlCounter).padStart(4,'0');
      return buildTLRow(t,rankInBucket,spv,bulan,tahun,activeSetup,bk,tlId);
    }).join('');

    const bkCount=new Set(Object.values(byBucket[bk]).flat().map(r=>r.agent)).size;
    return `<div class="bucket-group">
      <div class="bucket-header">
        <span class="bucket-label">${escH(bk)}</span>
        <span class="bucket-badge">${Object.keys(byBucket[bk]).length} TL · ${bkCount} agent</span>
      </div>
      ${tlRows}
    </div>`;
  }).join('');

  const spvBlockId='spvblock-'+btoa(encodeURIComponent(spv)).replace(/[^a-zA-Z0-9]/g,'').substring(0,16);
  const setupBarId='setupbar-'+btoa(encodeURIComponent(spv)).replace(/[^a-zA-Z0-9]/g,'').substring(0,16);
  const metricsGridId='metrics-'+btoa(encodeURIComponent(spv)).replace(/[^a-zA-Z0-9]/g,'').substring(0,16);
  // safeSpvId: ID-safe version untuk dipakai di element ID HTML
  const safeSpvId=btoa(encodeURIComponent(spv)).replace(/[^a-zA-Z0-9]/g,'').substring(0,16);
  const bucketAnalysisId='bkanal-'+safeSpvId;

  // Simpan data agent per bucket untuk keperluan analisa
  spvAgentDataCache[spv]=rows;

  spvSummaryCache[spv]=s;

  // Build bucket options untuk filter analisa
  const bucketOptionsHtml=Object.keys(byBucket).sort().map(bk=>`<option value="${escH(bk)}">${escH(bk)}</option>`).join('');

  return `<div class="spv-block" id="${spvBlockId}">
    <div class="spv-header">
      <div class="spv-header-left">
        <div class="spv-avatar">${initials}</div>
        <div><div class="spv-name">${escH(spv)}</div><div class="spv-meta">${escH(appList)} · ${Object.keys(byBucket).length} bucket · ${agentCount} agent</div></div>
      </div>
      <div class="spv-header-right">
        <span class="pill-blue">${bulan} ${tahun}</span>
        <button class="btn-add-setup" onclick="openSetupModal('${safeSpv}',null)">+ Setup baru</button>
      </div>
    </div>
    <div class="setup-bar" id="${setupBarId}">${setupTabs.length?setupTabs:'<span style="font-size:12px;color:var(--text3)">Belum ada setup</span>'}</div>
    <div class="spv-metrics-grid" id="${metricsGridId}">
      <div class="metric-box accent"><div class="lbl">Total Payment</div><div class="val">${fmtRp(s.dailyPayment)}</div><div class="sub">${fmtRp(s.paymentOvertime)} overtime</div></div>
      <div class="metric-box"><div class="lbl">Avg Rate</div><div class="val">${fmtRate(s.avgRate)}</div><div class="sub">${fmtNum(s.jmlDataBayar)} data bayar</div></div>
      <div class="metric-box"><div class="lbl">PTP</div><div class="val">${fmtNum(s.ptp)}</div><div class="sub">${fmtNum(s.ptpBayar)} bayar</div></div>
      <div class="metric-box"><div class="lbl">Sentuh WA</div><div class="val">${fmtNum(s.sentuhWA)}</div><div class="sub">${fmtNum(s.responWA)} respon</div></div>
      <div class="metric-box"><div class="lbl">Sentuh Gojek</div><div class="val">${fmtNum(s.sentuhGojek)}</div><div class="sub">${fmtNum(s.responGojek)} respon</div></div>
      <div class="metric-box"><div class="lbl">Sentuh WABA</div><div class="val">${fmtNum(s.sentuhWABA)}</div><div class="sub">${fmtNum(s.responWABA)} respon</div></div>
      <div class="metric-box"><div class="lbl">WA Blokir</div><div class="val">${fmtNum(s.waBlokir)}</div></div>
      ${metricBoxes}
    </div>
    ${bucketBlocks}
    <div class="bucket-analysis-wrap" id="${bucketAnalysisId}">
      <div class="bucket-analysis-title">⚠ Perhatian Khusus Agent per Bucket</div>
      <div class="bucket-filter-row">
        <label>Bucket:</label>
        <select id="selAnalysisBucket-${safeSpvId}" onchange="onAnalysisBucketChange('${safeSpv}','${safeSpvId}')">
          <option value="">-- Pilih Bucket --</option>
          ${bucketOptionsHtml}
        </select>
        <label style="margin-left:10px">Tanggal:</label>
        <select id="selAnalysisTanggal-${safeSpvId}" onchange="renderAttentionPanel('${safeSpv}','${safeSpvId}')">
          <option value="">-- Semua Tanggal --</option>
        </select>
        <span style="font-size:11px;color:var(--text3)">→ Pilih bucket untuk lihat agent yang butuh perhatian</span>
      </div>
      <div class="bucket-analysis-grid">
        <div class="bucket-analysis-panel-wrap">
          <div class="attention-list" id="attList-${safeSpvId}">
            <div class="no-attention">Pilih bucket di atas</div>
          </div>
        </div>
        <div class="analysis-panel" id="attAnalysis-${safeSpvId}">
          <div class="analysis-empty">← Pilih bucket lalu klik agent untuk lihat analisa</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ============================================================
// POINT 2: Format label rotasi dengan tanggal
// ============================================================
function formatRotasiLabel(type, prevFirstName, dateStr, bucketAktif) {
  const BULAN_SHORT=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  let dayStr='';
  if(dateStr){
    const parts=dateStr.split('-');
    if(parts.length===3){
      const day=parseInt(parts[2],10);
      const monthIdx=parseInt(parts[1],10)-1;
      if(!isNaN(day)&&monthIdx>=0&&monthIdx<12){
        dayStr=' '+day+' '+BULAN_SHORT[monthIdx];
      }
    }
  }
  if(type==='pengganti'){
    return `<span class="label-pengganti">Pengganti (${escH(prevFirstName)})${escH(dayStr)}</span>`;
  }else if(type==='pindah'){
    const tujuan=bucketAktif?' ke '+bucketAktif:'';
    return `<span class="label-pindah">Pindah${escH(tujuan)}${escH(dayStr)}</span>`;
  }else{
    return `<span class="label-nonaktif">Nonaktif${escH(dayStr)}</span>`;
  }
}

// ============================================================
// POINT 3: Kalkulasi skor risiko agent
// ============================================================
/* ============================================================
   SCORING ENGINE — poin analisa per agent
   Skor 0-100: makin tinggi makin berisiko
   ============================================================ */
function calcRiskScore(agentRows, allSpvRows, isSingleDay){
  const s=summarizeRows(agentRows);
  const firstRow=agentRows[0]||{};
  const aplikasi=firstRow.aplikasi||'';
  const bucket=firstRow.bucket||'';
  const agentName=firstRow.agent||'';

  // Hitung rata-rata PEERS (seluruh agent di bucket yg sama, bukan hanya SPV ini)
  const peers=allSpvRows.filter(r=>r.aplikasi===aplikasi&&r.bucket===bucket&&r.agent!==agentName);
  const peerAgents=[...new Set(peers.map(r=>r.agent))];
  let peerAvg={sentuhWA:0,callManual:0,callTerhubung:0,dailyPayment:0,avgRate:0,ptp:0,sentuhGojek:0,sentuhWABA:0,waBlokir:0};
  if(peerAgents.length>0){
    const peerS=summarizeRows(peers);
    const n=peerAgents.length;
    peerAvg.sentuhWA=peerS.sentuhWA/n;
    peerAvg.callManual=peerS.callManual/n;
    peerAvg.callTerhubung=peerS.callTerhubung/n;
    peerAvg.dailyPayment=peerS.dailyPayment/n;
    peerAvg.avgRate=peerS.avgRate;
    peerAvg.ptp=peerS.ptp/n;
    peerAvg.sentuhGojek=peerS.sentuhGojek/n;
    peerAvg.sentuhWABA=peerS.sentuhWABA/n;
    peerAvg.waBlokir=peerS.waBlokir/n;
  }

  const hadirCount=agentRows.filter(r=>r.absensi==='Hadir').length;
  const offCount=agentRows.filter(r=>r.absensi==='Off').length;
  const izinCount=agentRows.filter(r=>r.absensi==='Izin').length;
  const sakitCount=agentRows.filter(r=>r.absensi==='Sakit').length;
  const alphaCount=agentRows.filter(r=>r.absensi==='Alpha').length;
  const totalHari=agentRows.length||1;
  const hadirRatio=hadirCount/totalHari;

  const catatanRows=agentRows.filter(r=>r.catatanSPV&&r.catatanSPV.trim()!=='');
  const catatanCount=catatanRows.length;

  // Hari hadir tapi payment nol
  const hadirTapiNolPayment=agentRows.filter(r=>r.absensi==='Hadir'&&(r.dailyPayment||0)===0).length;

  // WA blokir vs sentuh: rasio blokir tinggi = spammer / tidak efektif
  const waBlokRatio=s.sentuhWA>0?s.waBlokir/s.sentuhWA:0;

  // Call terhubung ratio: dari call manual, berapa yang terhubung?
  const callConnRatio=s.callManual>0?s.callTerhubung/s.callManual:0;

  // PTP ratio: dari data bayar berapa yang PTP?
  const ptpBayarRatio=s.ptp>0?s.ptpBayar/s.ptp:0;

  let score=0;
  const issues=[];

  // ── KELOMPOK A: KEHADIRAN ──────────────────────────────────
  if(alphaCount>0){
    score+=alphaCount*10;
    issues.push({type:'alpha',group:'Kehadiran',level:'kritis',
      label:`Alpha ${alphaCount} hari`,
      detail:`Tidak hadir tanpa keterangan ${alphaCount} hari`,
      pct:Math.round(alphaCount/totalHari*100)});
  }
  if(hadirRatio<0.6&&alphaCount===0){
    score+=30;
    issues.push({type:'absensi',group:'Kehadiran',level:'kritis',
      label:'Tingkat kehadiran rendah',
      detail:`${hadirCount}/${totalHari} hari hadir (${Math.round(hadirRatio*100)}%) — Off: ${offCount}, Izin: ${izinCount}, Sakit: ${sakitCount}`,
      pct:Math.round(hadirRatio*100)});
  } else if(hadirRatio<0.8&&alphaCount===0){
    score+=12;
    issues.push({type:'absensi',group:'Kehadiran',level:'waspada',
      label:'Kehadiran perlu diperhatikan',
      detail:`${hadirCount}/${totalHari} hari hadir (${Math.round(hadirRatio*100)}%) — Off: ${offCount}, Izin: ${izinCount}`,
      pct:Math.round(hadirRatio*100)});
  }

  // ── KELOMPOK B: AKTIVITAS PENAGIHAN ───────────────────────
  // B1. Sentuh WA
  if(peerAvg.sentuhWA>0){
    const r=s.sentuhWA/peerAvg.sentuhWA;
    if(r<0.4){score+=30;issues.push({type:'sentuhWA',group:'Aktivitas',level:'kritis',label:'Sentuh WA jauh di bawah rata-rata',detail:`${fmtNum(s.sentuhWA)} vs rata-rata ${fmtNum(Math.round(peerAvg.sentuhWA))} (${Math.round(r*100)}%)`,pct:Math.round(r*100)});}
    else if(r<0.7){score+=15;issues.push({type:'sentuhWA',group:'Aktivitas',level:'waspada',label:'Sentuh WA di bawah rata-rata',detail:`${fmtNum(s.sentuhWA)} vs rata-rata ${fmtNum(Math.round(peerAvg.sentuhWA))} (${Math.round(r*100)}%)`,pct:Math.round(r*100)});}
  } else if(s.sentuhWA<50){
    score+=25;issues.push({type:'sentuhWA',group:'Aktivitas',level:'kritis',label:'Sentuh WA sangat sedikit',detail:`Hanya ${fmtNum(s.sentuhWA)} sentuhan`,pct:0});
  }

  // B2. Call Manual
  if(peerAvg.callManual>0){
    const r=s.callManual/peerAvg.callManual;
    if(r<0.4){score+=15;issues.push({type:'callManual',group:'Aktivitas',level:'kritis',label:'Call Manual sangat rendah',detail:`${fmtNum(s.callManual)} vs rata-rata ${fmtNum(Math.round(peerAvg.callManual))} (${Math.round(r*100)}%)`,pct:Math.round(r*100)});}
    else if(r<0.65){score+=8;issues.push({type:'callManual',group:'Aktivitas',level:'waspada',label:'Call Manual di bawah rata-rata',detail:`${fmtNum(s.callManual)} vs rata-rata ${fmtNum(Math.round(peerAvg.callManual))} (${Math.round(r*100)}%)`,pct:Math.round(r*100)});}
  }

  // B3. Call terhubung ratio
  if(s.callManual>50&&callConnRatio<0.15){
    score+=10;issues.push({type:'callConn',group:'Aktivitas',level:'waspada',label:'Rasio call terhubung rendah',detail:`${fmtNum(s.callTerhubung)} terhubung dari ${fmtNum(s.callManual)} call (${Math.round(callConnRatio*100)}%)`,pct:Math.round(callConnRatio*100)});
  }

  // B4. WA Blokir ratio tinggi
  if(s.sentuhWA>100&&waBlokRatio>0.1){
    score+=8;issues.push({type:'waBlokir',group:'Aktivitas',level:'waspada',label:'Tingkat WA diblokir tinggi',detail:`${fmtNum(s.waBlokir)} blokir dari ${fmtNum(s.sentuhWA)} sentuh (${Math.round(waBlokRatio*100)}%)`,pct:Math.round(waBlokRatio*100)});
  }

  // ── KELOMPOK C: HASIL / OUTCOME ────────────────────────────
  // C1. Payment vs rata-rata
  if(peerAvg.dailyPayment>0){
    const r=s.dailyPayment/peerAvg.dailyPayment;
    if(r<0.3){score+=25;issues.push({type:'payment',group:'Hasil',level:'kritis',label:'Payment jauh di bawah rata-rata',detail:`${fmtRp(s.dailyPayment)} vs rata-rata ${fmtRp(Math.round(peerAvg.dailyPayment))} (${Math.round(r*100)}%)`,pct:Math.round(r*100)});}
    else if(r<0.6){score+=12;issues.push({type:'payment',group:'Hasil',level:'waspada',label:'Payment di bawah rata-rata',detail:`${fmtRp(s.dailyPayment)} vs rata-rata ${fmtRp(Math.round(peerAvg.dailyPayment))} (${Math.round(r*100)}%)`,pct:Math.round(r*100)});}
  }

  // C2. Rate bayar
  if(s.avgRate<0.005){score+=20;issues.push({type:'rate',group:'Hasil',level:'kritis',label:'Rate bayar sangat rendah',detail:`${fmtRate(s.avgRate)} dari ${fmtNum(s.jmlDataBayar)} data bayar`,pct:Math.round(s.avgRate*10000)/100});}
  else if(s.avgRate<0.015){score+=10;issues.push({type:'rate',group:'Hasil',level:'waspada',label:'Rate bayar rendah',detail:`${fmtRate(s.avgRate)} dari ${fmtNum(s.jmlDataBayar)} data bayar`,pct:Math.round(s.avgRate*10000)/100});}

  // C3. PTP tapi realisasi bayar rendah
  if(s.ptp>5&&ptpBayarRatio<0.3){
    score+=10;issues.push({type:'ptp',group:'Hasil',level:'waspada',label:'Realisasi PTP rendah',detail:`${fmtNum(s.ptpBayar)} bayar dari ${fmtNum(s.ptp)} PTP (${Math.round(ptpBayarRatio*100)}%) — janji tidak terpenuhi`,pct:Math.round(ptpBayarRatio*100)});
  }

  // C4. Hadir tapi tidak ada payment
  if(hadirCount>0&&hadirTapiNolPayment/hadirCount>0.5){
    score+=12;issues.push({type:'nolPayment',group:'Hasil',level:'waspada',label:'Banyak hari hadir tanpa payment',detail:`${hadirTapiNolPayment} dari ${hadirCount} hari hadir payment-nya Rp 0`,pct:Math.round(hadirTapiNolPayment/hadirCount*100)});
  }

  // ── KELOMPOK D: CATATAN & KEDISIPLINAN ─────────────────────
  if(catatanCount>=5){score+=15;issues.push({type:'catatan',group:'Kedisiplinan',level:'kritis',label:'Sangat banyak catatan SPV',detail:`${catatanCount} hari ada catatan — cek rincian di data harian`,pct:0});}
  else if(catatanCount>=3){score+=8;issues.push({type:'catatan',group:'Kedisiplinan',level:'waspada',label:'Banyak catatan SPV',detail:`${catatanCount} hari ada catatan dari SPV`,pct:0});}

  score=Math.min(score,100);

  // ── SARAN TINDAK LANJUT ─────────────────────────────────────
  const saranList=[];
  const types=issues.map(i=>i.type);
  if(types.includes('alpha'))saranList.push(`Tindak disiplin pelanggaran alpha — wajib klarifikasi tertulis dari agent`);
  if(types.includes('absensi'))saranList.push(`Buat jadwal coaching kehadiran, target minimum ${Math.ceil(totalHari*0.85)} hari hadir`);
  if(types.includes('sentuhWA'))saranList.push(`Target sentuh WA minimal ${fmtNum(Math.round(peerAvg.sentuhWA*0.85||300))} — minta laporan harian`);
  if(types.includes('callManual'))saranList.push(`Tambah call session harian, review daftar nomor yang perlu dihubungi ulang`);
  if(types.includes('callConn'))saranList.push(`Evaluasi kualitas data nomor — banyak yang tidak aktif, perlu update nomor kontak`);
  if(types.includes('waBlokir'))saranList.push(`Kurangi frekuensi blast WA otomatis, fokus ke pesan personal agar tidak diblokir`);
  if(types.includes('payment'))saranList.push(`Review strategi penagihan, prioritaskan akun dengan DPD tinggi dan saldo besar`);
  if(types.includes('rate'))saranList.push(`Cek kualitas akun yang dipegang — pertimbangkan rotasi ke akun yang lebih potensial`);
  if(types.includes('ptp'))saranList.push(`Follow-up PTP yang belum bayar sebelum jatuh tempo, catat alasan di sistem`);
  if(types.includes('nolPayment'))saranList.push(`Identifikasi hari hadir tanpa payment — apakah akun sudah disentuh atau hanya absen teknis?`);
  if(types.includes('catatan'))saranList.push(`Jadwalkan sesi 1-on-1 segera, buat action plan tertulis dan pantau progres harian`);
  if(saranList.length===0)saranList.push('Performa baik! Pertahankan dan jadikan benchmark tim.');
  if(score>=60)saranList.push('⚠ Risiko tinggi — pertimbangkan monitoring harian & eskalasi ke manajemen jika tidak ada perbaikan dalam 3 hari.');

  return{score,issues,saranList,s,hadirCount,hadirRatio,offCount,izinCount,sakitCount,alphaCount,totalHari,catatanCount,catatanRows,hadirTapiNolPayment,waBlokRatio,callConnRatio,ptpBayarRatio,peerAvg,peerAgents};
}

/* ============================================================
   BUCKET SUMMARY — analisa level bucket (tampil saat bucket dipilih)
   ============================================================ */
function buildBucketSummaryHtml(spv, safeSpvId, bucketRows, allSpvRows){
  if(!bucketRows||!bucketRows.length)return'';
  const s=summarizeRows(bucketRows);
  const byAgent={};
  bucketRows.forEach(r=>{const ag=r.agent||'(?)';if(!byAgent[ag])byAgent[ag]=[];byAgent[ag].push(r);});
  const agList=Object.keys(byAgent);
  const n=agList.length||1;

  // Rank by payment
  const ranked=agList.map(ag=>{
    const rs=summarizeRows(byAgent[ag]);
    const hadir=byAgent[ag].filter(r=>r.absensi==='Hadir').length;
    return{ag,payment:rs.dailyPayment,rate:rs.avgRate,sentuhWA:rs.sentuhWA,ptp:rs.ptp,hadir,total:byAgent[ag].length,rows:byAgent[ag]};
  }).sort((a,b)=>b.payment-a.payment);

  // Hitung rata-rata & temukan outlier
  const avgPayment=s.dailyPayment/n;
  const avgSentuhWA=s.sentuhWA/n;
  const avgHadirRatio=ranked.reduce((a,x)=>a+x.hadir/x.total,0)/n;

  // Insights bucket
  const insights=[];
  const topAgent=ranked[0];
  const bottomAgent=ranked[ranked.length-1];

  // 1. Agent paling beda dari rata-rata
  if(topAgent&&n>1){
    const topRatio=avgPayment>0?topAgent.payment/avgPayment:0;
    if(topRatio>2.5)insights.push({dot:'dot-blue',text:`<b>${topAgent.ag}</b> mendominasi payment (${fmtRp(topAgent.payment)} = ${Math.round(topRatio*100)}% dari rata-rata). Tim sangat bergantung pada 1 agent — risiko jika agent ini berhalangan.`});
  }
  // 2. Agent payment nol tapi hadir
  const nolPayHadir=ranked.filter(a=>a.payment===0&&a.hadir>0);
  if(nolPayHadir.length>0)insights.push({dot:'dot-red',text:`<b>${nolPayHadir.length} agent</b> hadir tapi payment Rp 0 sepanjang bulan: ${nolPayHadir.slice(0,3).map(a=>a.ag).join(', ')}${nolPayHadir.length>3?'...':''}`});
  // 3. Rate rata-rata bucket
  if(s.avgRate>0&&s.avgRate<0.01)insights.push({dot:'dot-warn',text:`Rate rata-rata bucket rendah (${fmtRate(s.avgRate)}) — evaluasi kualitas data akun di bucket ini`});
  if(s.avgRate>=0.03)insights.push({dot:'dot-green',text:`Rate rata-rata bucket bagus (${fmtRate(s.avgRate)}) — pertahankan strategi penagihan`});
  // 4. WA Blokir vs Sentuh
  const bucketBlokRatio=s.sentuhWA>0?s.waBlokir/s.sentuhWA:0;
  if(bucketBlokRatio>0.08)insights.push({dot:'dot-warn',text:`Rasio WA diblokir tinggi di bucket ini (${Math.round(bucketBlokRatio*100)}%) — evaluasi cara penghubungan debitor`});
  // 5. Kehadiran rata-rata
  if(avgHadirRatio<0.75)insights.push({dot:'dot-red',text:`Rata-rata kehadiran bucket rendah (${Math.round(avgHadirRatio*100)}%) — perlu evaluasi absensi tim`});
  // 6. Kesenjangan payment tertinggi vs terendah
  if(n>2&&bottomAgent&&topAgent&&bottomAgent.payment<topAgent.payment*0.1&&topAgent.payment>0){
    insights.push({dot:'dot-warn',text:`Kesenjangan payment besar: tertinggi ${fmtRp(topAgent.payment)} (${topAgent.ag}) vs terendah ${fmtRp(bottomAgent.payment)} (${bottomAgent.ag}) — kemungkinan ketidakmerataan distribusi akun`});
  }
  // 7. PTP realisasi
  if(s.ptp>10){
    const ptpReal=s.ptpBayar/s.ptp;
    if(ptpReal<0.3)insights.push({dot:'dot-warn',text:`Realisasi PTP bucket rendah: ${fmtNum(s.ptpBayar)} bayar dari ${fmtNum(s.ptp)} PTP (${Math.round(ptpReal*100)}%) — perlu follow-up lebih ketat`});
  }
  if(!insights.length)insights.push({dot:'dot-green',text:'Tidak ada temuan kritis di level bucket — performa relatif merata.'});

  // Top 3 & bottom 3 agent
  const top3=ranked.slice(0,3);
  const bot3=ranked.slice(-3).filter(a=>!top3.includes(a));

  const medalCls=(i)=>i===0?'medal-1':i===1?'medal-2':i===2?'medal-3':'medal-n';

  const topRows=top3.map((a,i)=>`
    <div class="bucket-rank-row">
      <div class="bucket-rank-medal ${medalCls(i)}">${i+1}</div>
      <div class="bucket-rank-name">${escH(a.ag)}</div>
      <span class="bucket-rank-badge badge-top">${a.hadir}/${a.total} hadir</span>
      <div class="bucket-rank-val">${fmtRp(a.payment)}</div>
    </div>`).join('');

  const botRows=bot3.length?bot3.map((a,i)=>`
    <div class="bucket-rank-row">
      <div class="bucket-rank-medal medal-n">${ranked.length-bot3.length+i+1}</div>
      <div class="bucket-rank-name">${escH(a.ag)}</div>
      <span class="bucket-rank-badge badge-low">${fmtRp(a.payment)}</span>
      <div class="bucket-rank-val" style="color:var(--text3)">${a.hadir}/${a.total} hadir</div>
    </div>`).join(''):'';

  return `<div class="bucket-summary-panel">
    <div class="bucket-sum-title">📊 Ringkasan Bucket</div>
    <div class="bucket-sum-grid">

// Saat bucket berubah: isi dropdown tanggal, lalu render panel
function onAnalysisBucketChange(spv, safeSpvId){
  const selBucket=document.getElementById('selAnalysisBucket-'+safeSpvId);
  const selTanggal=document.getElementById('selAnalysisTanggal-'+safeSpvId);
  if(!selBucket||!selTanggal)return;
  const selectedBucket=selBucket.value;
  // Reset & isi dropdown tanggal berdasarkan data bucket yang dipilih
  selTanggal.innerHTML='<option value="">-- Semua Tanggal --</option>';
  if(selectedBucket){
    const allSpvRows=spvAgentDataCache[spv]||[];
    const tanggalList=[...new Set(
      allSpvRows.filter(r=>r.bucket===selectedBucket&&r.tanggal).map(r=>r.tanggal)
    )].sort();
    tanggalList.forEach(tgl=>{
      const opt=document.createElement('option');
      opt.value=tgl;
      // Format tampilan: DD/MM/YYYY atau langsung YYYY-MM-DD
      const parts=tgl.split('-');
      opt.textContent=parts.length===3?parts[2]+'/'+parts[1]+'/'+parts[0]:tgl;
      selTanggal.appendChild(opt);
    });
  }
  renderAttentionPanel(spv, safeSpvId);
}

function renderAttentionPanel(spv, safeSpvId){
  const selEl=document.getElementById('selAnalysisBucket-'+safeSpvId);
  const selTgl=document.getElementById('selAnalysisTanggal-'+safeSpvId);
  const listEl=document.getElementById('attList-'+safeSpvId);
  const analysisEl=document.getElementById('attAnalysis-'+safeSpvId);
  if(!selEl||!listEl||!analysisEl)return;
  const selectedBucket=selEl.value;
  const selectedTanggal=selTgl?selTgl.value:'';
  if(!selectedBucket){
    listEl.innerHTML='<div class="no-attention">Pilih bucket di atas</div>';
    analysisEl.innerHTML='<div class="analysis-empty">← Pilih bucket lalu klik agent untuk lihat analisa</div>';
    return;
  }
  const allSpvRows=spvAgentDataCache[spv]||[];
  // Filter bucket, lalu opsional filter tanggal
  let bucketRows=allSpvRows.filter(r=>r.bucket===selectedBucket);
  if(!bucketRows.length){listEl.innerHTML='<div class="no-attention">Tidak ada data di bucket ini.</div>';return;}

  // Jika filter tanggal aktif: tampilkan performa agent di tanggal itu saja
  const isTanggalFilter=!!selectedTanggal;
  const rowsForScoring=isTanggalFilter?bucketRows.filter(r=>r.tanggal===selectedTanggal):bucketRows;

  if(isTanggalFilter&&!rowsForScoring.length){
    listEl.innerHTML='<div class="no-attention">Tidak ada data di tanggal ini.</div>';
    return;
  }

  // Kelompokkan per agent (gunakan rows yang sudah difilter)
  const byAgent={};
  rowsForScoring.forEach(r=>{const ag=r.agent||('?');if(!byAgent[ag])byAgent[ag]=[];byAgent[ag].push(r);});

  // Hitung skor risiko — jika filter tanggal aktif, skor berbasis data 1 hari
  const agentScores=Object.entries(byAgent).map(([ag,rows])=>{
    // Untuk context perbandingan tim, selalu pakai semua data bucket (bukan 1 tanggal)
    const risk=calcRiskScore(rows, allSpvRows, isTanggalFilter);
    return{ag,rows,risk};
  }).filter(x=>isTanggalFilter?true:x.risk.score>20) // saat 1 tanggal: tampilkan semua, sorted by payment
    .sort((a,b)=>isTanggalFilter
      ?(b.rows.reduce((s,r)=>s+(r.dailyPayment||0),0))-(a.rows.reduce((s,r)=>s+(r.dailyPayment||0),0))
      :b.risk.score-a.risk.score
    );

  // Selalu tampilkan bucket summary di panel kanan dulu
  analysisEl.innerHTML=buildBucketSummaryHtml(spv, safeSpvId, rowsForScoring, allSpvRows);

  if(!agentScores.length){
    listEl.innerHTML='<div class="no-attention" style="color:var(--success);padding:20px 0">✅ Semua agent di bucket ini dalam kondisi baik!</div>';
    return;
  }

  // Label header berbeda tergantung mode
  const headerBadge=isTanggalFilter
    ?`<div style="font-size:11px;color:var(--accent);padding:6px 0 8px;font-weight:500">📅 Menampilkan performa tanggal ${selectedTanggal.split('-').reverse().join('/')} — ${agentScores.length} agent</div>`
    :'';

  listEl.innerHTML=headerBadge+agentScores.map((x,i)=>{
    const initials=x.ag.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    const isKritis=x.risk.score>=50;
    const avCls=isTanggalFilter?(x.rows.reduce((s,r)=>s+(r.dailyPayment||0),0)>0?'av-ok':'av-warning'):isKritis?'av-danger':'av-warning';
    const badgeCls=isKritis?'risk-kritis':'risk-waspada';
    const badgeLabel=isKritis?'Kritis':'Waspada';
    // Info sub berbeda: 1 tanggal tampilkan payment hari itu
    const dailyPay=x.rows.reduce((s,r)=>s+(r.dailyPayment||0),0);
    const subText=isTanggalFilter
      ?`${x.rows[0]?x.rows[0].absensi||'—':'—'} · Payment: ${fmtRp(dailyPay)}`
      :`${x.rows.length} hari data · ${x.risk.hadirCount}/${x.risk.totalHari} hadir`;
    const rightBadge=isTanggalFilter
      ?`<span style="font-size:11px;font-weight:600;color:${dailyPay>0?'var(--success)':'var(--text3)'}">${fmtRp(dailyPay)}</span>`
      :`<span class="risk-badge ${badgeCls}">${badgeLabel}</span><span class="risk-score-num" style="color:${isKritis?'var(--danger)':'var(--warning)'}">${x.risk.score}</span>`;
    return `<div class="attention-item" id="attItem-${safeSpvId}-${i}" onclick="selectAttentionAgent('${escA(spv)}','${safeSpvId}',${i})">
      <div class="attention-avatar ${avCls}">${escH(initials)}</div>
      <div class="attention-info">
        <div class="attention-name">${escH(x.ag)}</div>
        <div class="attention-sub">${subText}</div>
      </div>
      ${rightBadge}
    </div>`;
  }).join('');
  // Simpan data untuk diakses saat klik
  window['_attData_'+safeSpvId]=agentScores;
  window['_attTanggal_'+safeSpvId]=selectedTanggal;
}
