<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desk Collection Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #F7F8FA;
  --surface: #FFFFFF;
  --surface2: #F0F2F5;
  --border: #E4E7EC;
  --text: #111827;
  --text2: #4B5563;
  --text3: #9CA3AF;
  --accent: #1D60C8;
  --accent-bg: #EEF3FD;
  --accent-light: #DBEAFE;
  --success: #059669;
  --success-bg: #ECFDF5;
  --warning: #D97706;
  --warning-bg: #FFFBEB;
  --danger: #DC2626;
  --danger-bg: #FEF2F2;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #0F1117;
  --surface: #1A1D27;
  --surface2: #232635;
  --border: #2E3347;
  --text: #F1F3F9;
  --text2: #9AA5BE;
  --text3: #5C6680;
  --accent: #4A8CF7;
  --accent-bg: #1A2540;
  --accent-light: #1E2D50;
  --success: #34D399;
  --success-bg: #0D2E22;
  --warning: #FBBF24;
  --warning-bg: #2D200A;
  --danger: #F87171;
  --danger-bg: #2D0F0F;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; transition: background .2s, color .2s; }

/* NAV */
.navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.nav-brand { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.nav-brand span { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 12px; }
.btn-icon { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; cursor: pointer; color: var(--text2); font-size: 13px; display: flex; align-items: center; gap: 6px; transition: all .15s; }
.btn-icon:hover { background: var(--surface2); border-color: var(--text3); }
.last-update { font-size: 12px; color: var(--text3); }

/* LAYOUT */
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; }

/* FILTER BAR */
.filter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; box-shadow: var(--shadow); }
.filter-bar label { font-size: 12px; color: var(--text3); font-weight: 500; }
select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; color: var(--text); font-size: 13px; cursor: pointer; outline: none; }
select:focus { border-color: var(--accent); }
.filter-sep { flex: 1; }
.btn-refresh { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity .15s; }
.btn-refresh:hover { opacity: .88; }
.btn-refresh:disabled { opacity: .5; cursor: not-allowed; }

/* SUMMARY CARDS */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.sum-card .label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.sum-card .value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
.sum-card .sub { font-size: 11px; color: var(--text3); }
.sum-card.accent { border-color: var(--accent); background: var(--accent-bg); }
.sum-card.accent .value { color: var(--accent); }

/* APP CARDS */
.apps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
.app-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.app-card-header { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.app-name { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.app-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.app-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.btn-setup { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 11px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all .15s; }
.btn-setup:hover { background: var(--surface2); }
.app-card-body { padding: 14px 18px; }
.metrics-row { display: grid; gap: 10px; }
.metric-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--surface2); border-radius: var(--radius-sm); }
.metric-name { font-size: 12px; color: var(--text2); }
.metric-val { font-size: 14px; font-weight: 600; color: var(--text); }
.metric-val.good { color: var(--success); }
.metric-val.warn { color: var(--warning); }
.app-card-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.footer-stat { font-size: 11px; color: var(--text3); }
.footer-stat span { color: var(--text2); font-weight: 500; }

/* WEEKLY SECTION */
.weekly-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 24px; overflow: hidden; }
.weekly-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.weekly-title { font-size: 14px; font-weight: 600; }
.weekly-body { padding: 18px; overflow-x: auto; }
.weekly-table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
.weekly-table th { text-align: left; padding: 8px 12px; color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border); }
.weekly-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
.weekly-table tr:last-child td { border-bottom: none; }
.weekly-table td:first-child { font-weight: 600; color: var(--text); }
.weekly-table td.num { color: var(--text); font-weight: 500; }

/* SETUP MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 480px; box-shadow: var(--shadow-md); }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 18px 20px; max-height: 60vh; overflow-y: auto; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.metric-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; transition: background .12s; }
.metric-toggle:hover { background: var(--surface2); }
.metric-toggle input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
.metric-toggle-label { font-size: 13px; color: var(--text); }
.btn-save { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-cancel { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; color: var(--text2); cursor: pointer; }
.btn-cancel:hover { background: var(--surface2); }

/* LOADING / ERROR */
.state-box { text-align: center; padding: 60px 20px; color: var(--text3); }
.state-box .icon { font-size: 36px; margin-bottom: 12px; }
.state-box p { font-size: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* BADGES */
.pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-blue { background: var(--accent-bg); color: var(--accent); }
.pill-green { background: var(--success-bg); color: var(--success); }
.pill-warn { background: var(--warning-bg); color: var(--warning); }

/* RESPONSIVE */
@media (max-width: 600px) {
  .container { padding: 14px; }
  .apps-grid { grid-template-columns: 1fr; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .navbar { padding: 0 14px; }
  .filter-bar { gap: 8px; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    📊 <span>Desk</span>Collection Analytics
  </div>
  <div class="nav-right">
    <span class="last-update" id="lastUpdate">—</span>
    <a href="team.html" style="font-size:13px;color:var(--text2);text-decoration:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;transition:all .15s;" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='none'">👥 Tim</a>
    <a href="agent.html" style="font-size:13px;color:var(--text2);text-decoration:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;transition:all .15s;" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='none'">👤 Agent</a>
    <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌙 Gelap</button>
  </div>
</nav>

<!-- MAIN -->
<div class="container">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <label>Bulan</label>
    <select id="selBulan" onchange="loadData()">
      <option value="Januari">Januari</option>
      <option value="Februari">Februari</option>
      <option value="Maret">Maret</option>
      <option value="April">April</option>
      <option value="Mei">Mei</option>
      <option value="Juni">Juni</option>
      <option value="Juli">Juli</option>
      <option value="Agustus">Agustus</option>
      <option value="September">September</option>
      <option value="Oktober">Oktober</option>
      <option value="November">November</option>
      <option value="Desember">Desember</option>
    </select>
    <label>Tahun</label>
    <select id="selTahun" onchange="loadData()">
      <option value="2025">2025</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>
    <div class="filter-sep"></div>
    <button class="btn-refresh" id="btnRefresh" onclick="loadData(true)">↻ Refresh</button>
  </div>

  <!-- SUMMARY CARDS -->
  <p class="section-title">Ringkasan Bulan</p>
  <div class="summary-grid" id="summaryGrid">
    <div class="state-box"><div class="spinner"></div><p>Memuat data...</p></div>
  </div>

  <!-- APP CARDS -->
  <p class="section-title">Per Aplikasi</p>
  <div class="apps-grid" id="appsGrid"></div>

  <!-- WEEKLY TABLE -->
  <div class="weekly-section" id="weeklySection" style="display:none">
    <div class="weekly-header">
      <span class="weekly-title">Rekap Mingguan</span>
      <span class="pill pill-blue" id="weeklyLabel">Juli 2026</span>
    </div>
    <div class="weekly-body">
      <table class="weekly-table" id="weeklyTable">
        <thead id="weeklyHead"></thead>
        <tbody id="weeklyBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- SETUP MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Setup tampilan</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" onclick="saveSetup()">Simpan</button>
    </div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
const API_URL = 'https://script.google.com/macros/s/AKfycbzLOdo9BWLLMMxzRoFaPYVYClQWyIadM1bNYkVvzUCgR4TPwdlSLkXEazbDmb6ELKGN/exec';

const APP_COLORS = {
  'GOPIN': '#1D60C8',
  'PINJAMIN': '#059669',
  'RUPIAH CEPAT': '#D97706',
  'KREDIONE': '#7C3AED',
  'KREDITOK': '#DC2626',
};

const ALL_METRICS = [
  { key: 'dailyPayment',    label: 'Daily Payment',     fmt: 'rp' },
  { key: 'avgRate',         label: 'Rate (%)',           fmt: 'rate' },
  { key: 'jmlDataBayar',   label: 'Data Bayar',         fmt: 'num' },
  { key: 'totalData',       label: 'Total Data',         fmt: 'num' },
  { key: 'dataBaru',        label: 'Data Baru',          fmt: 'num' },
  { key: 'autocall',        label: 'Autocall',           fmt: 'num' },
  { key: 'callManual',      label: 'Call Manual',        fmt: 'num' },
  { key: 'callTerhubung',   label: 'Call Terhubung',     fmt: 'num' },
  { key: 'sentuhWA',        label: 'Sentuh WA',          fmt: 'num' },
  { key: 'sentuhGojek',     label: 'Sentuh Gojek',       fmt: 'num' },
  { key: 'responWA',        label: 'Respon WA',          fmt: 'num' },
  { key: 'responGojek',     label: 'Respon Gojek',       fmt: 'num' },
  { key: 'sentuhWABA',      label: 'Sentuh WABA',        fmt: 'num' },
  { key: 'responWABA',      label: 'Respon WABA',        fmt: 'num' },
  { key: 'smsManual',       label: 'SMS Manual',         fmt: 'num' },
  { key: 'waBlokir',        label: 'WA Blokir',          fmt: 'num' },
  { key: 'ptp',             label: 'PTP',                fmt: 'num' },
  { key: 'ptpBayar',        label: 'PTP Bayar',          fmt: 'num' },
  { key: 'paymentOvertime', label: 'Payment Overtime',   fmt: 'rp'  },
  { key: 'osDataBaru',      label: 'OS Data Baru',       fmt: 'rp'  },
  { key: 'totalRecord',     label: 'Total Record',       fmt: 'num' },
];

const DEFAULT_METRICS = ['dailyPayment','avgRate','jmlDataBayar','callManual','sentuhWA','ptp'];

/* ============ STATE ============ */
let homeData = null;
let weeklyData = null;
let currentSetupApp = null;
let currentSetupChecked = [];

/* ============ FORMAT ============ */
function fmtRp(n) {
  if (!n || n === 0) return 'Rp 0';
  if (n >= 1e9) return 'Rp ' + (n/1e9).toFixed(2) + ' M';
  if (n >= 1e6) return 'Rp ' + (n/1e6).toFixed(1) + ' jt';
  if (n >= 1e3) return 'Rp ' + (n/1e3).toFixed(0) + ' rb';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}
function fmtNum(n) {
  if (!n) return '0';
  return Math.round(n).toLocaleString('id-ID');
}
function fmtRate(n) {
  if (!n) return '0%';
  return (n * 100).toFixed(2) + '%';
}
function fmt(key, val) {
  const m = ALL_METRICS.find(x => x.key === key);
  if (!m) return val;
  if (m.fmt === 'rp')   return fmtRp(val);
  if (m.fmt === 'rate') return fmtRate(val);
  return fmtNum(val);
}

/* ============ STORAGE ============ */
function getSetup(app) {
  try {
    const raw = localStorage.getItem('dca_setup_' + app);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return DEFAULT_METRICS.slice();
}
function saveSetupApp(app, keys) {
  localStorage.setItem('dca_setup_' + app, JSON.stringify(keys));
}

/* ============ THEME ============ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙 Gelap' : '☀️ Terang';
  localStorage.setItem('dca_theme', isDark ? 'light' : 'dark');
}
(function initTheme() {
  const t = localStorage.getItem('dca_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️ Terang' : '🌙 Gelap';
})();

/* ============ FILTER INIT ============ */
(function initFilter() {
  const now = new Date();
  const bulanNama = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  document.getElementById('selBulan').value = bulanNama[now.getMonth()];
  document.getElementById('selTahun').value = String(now.getFullYear());
})();

/* ============ LOAD DATA ============ */
async function loadData(force) {
  const bulan = document.getElementById('selBulan').value;
  const tahun = document.getElementById('selTahun').value;
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  btn.textContent = '⏳ Memuat...';

  showLoading();

  try {
    const [homeRes, weeklyRes] = await Promise.all([
      fetch(`${API_URL}?action=agentdata&bulan=${bulan}&tahun=${tahun}`),
      fetch(`${API_URL}?action=weekly&bulan=${bulan}&tahun=${tahun}`)
    ]);
    homeData   = await homeRes.json();
    weeklyData = await weeklyRes.json();

    if (!homeData.success) throw new Error(homeData.message || 'Gagal memuat data');

    renderSummary(homeData.summary);
    renderApps(homeData.rows, homeData.summary);
    renderWeekly(weeklyData, bulan, tahun);

    const now = new Date();
    document.getElementById('lastUpdate').textContent = 'Update: ' + now.toLocaleTimeString('id-ID');
  } catch(e) {
    showError(e.message);
  }

  btn.disabled = false;
  btn.textContent = '↻ Refresh';
}

function showLoading() {
  document.getElementById('summaryGrid').innerHTML = '<div class="state-box"><div class="spinner"></div><p>Memuat data...</p></div>';
  document.getElementById('appsGrid').innerHTML = '';
  document.getElementById('weeklySection').style.display = 'none';
}

function showError(msg) {
  document.getElementById('summaryGrid').innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>${msg}</p></div>`;
}

/* ============ RENDER SUMMARY ============ */
function renderSummary(s) {
  if (!s) return;
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = `
    <div class="sum-card accent">
      <div class="label">Total Payment</div>
      <div class="value">${fmtRp(s.dailyPayment)}</div>
      <div class="sub">${fmtRp(s.paymentOvertime)} overtime</div>
    </div>
    <div class="sum-card">
      <div class="label">Avg Rate</div>
      <div class="value">${fmtRate(s.avgRate)}</div>
      <div class="sub">${fmtNum(s.jmlDataBayar)} data bayar</div>
    </div>
    <div class="sum-card">
      <div class="label">Total Record</div>
      <div class="value">${fmtNum(s.totalRecord)}</div>
      <div class="sub">${fmtNum(s.totalData)} total data</div>
    </div>
    <div class="sum-card">
      <div class="label">Call Manual</div>
      <div class="value">${fmtNum(s.callManual)}</div>
      <div class="sub">${fmtNum(s.callTerhubung)} terhubung</div>
    </div>
    <div class="sum-card">
      <div class="label">Sentuh WA</div>
      <div class="value">${fmtNum(s.sentuhWA)}</div>
      <div class="sub">${fmtNum(s.responWA)} respon</div>
    </div>
    <div class="sum-card">
      <div class="label">PTP</div>
      <div class="value">${fmtNum(s.ptp)}</div>
      <div class="sub">${fmtNum(s.ptpBayar)} bayar</div>
    </div>
  `;
}

/* ============ RENDER APPS ============ */
function renderApps(rows, totalSummary) {
  if (!rows || rows.length === 0) {
    document.getElementById('appsGrid').innerHTML = '<div class="state-box"><div class="icon">📭</div><p>Tidak ada data untuk periode ini.</p></div>';
    return;
  }

  // Group by aplikasi
  const byApp = {};
  rows.forEach(r => {
    const ap = r.aplikasi || 'LAINNYA';
    if (!byApp[ap]) byApp[ap] = [];
    byApp[ap].push(r);
  });

  // Summarize per app
  const appSummaries = {};
  Object.keys(byApp).forEach(ap => {
    appSummaries[ap] = summarizeRows(byApp[ap]);
    appSummaries[ap].totalRecord = byApp[ap].length;
    appSummaries[ap].agentCount = new Set(byApp[ap].map(r => r.agent)).size;
  });

  const grid = document.getElementById('appsGrid');
  grid.innerHTML = Object.keys(appSummaries).sort().map(ap => {
    const s = appSummaries[ap];
    const color = APP_COLORS[ap] || '#888';
    const setup = getSetup(ap);

    const metricsHTML = setup.map(key => {
      const m = ALL_METRICS.find(x => x.key === key);
      if (!m) return '';
      const val = s[key] !== undefined ? s[key] : 0;
      const formatted = fmt(key, val);
      return `<div class="metric-item">
        <span class="metric-name">${m.label}</span>
        <span class="metric-val">${formatted}</span>
      </div>`;
    }).join('');

    return `
      <div class="app-card">
        <div class="app-card-header">
          <span class="app-name">
            <span class="app-dot" style="background:${color}"></span>
            ${ap}
          </span>
          <button class="btn-setup" onclick="openSetup('${ap}')">⚙ Setup tampilan</button>
        </div>
        <div class="app-card-body">
          <div class="metrics-row">${metricsHTML}</div>
        </div>
        <div class="app-card-footer">
          <span class="footer-stat"><span>${s.agentCount}</span> agent</span>
          <span class="footer-stat"><span>${fmtNum(s.totalRecord)}</span> record</span>
          <span class="footer-stat">Rate <span>${fmtRate(s.avgRate)}</span></span>
          <a href="agent.html?bulan=${encodeURIComponent(document.getElementById('selBulan').value)}&tahun=${document.getElementById('selTahun').value}" style="font-size:11px;color:var(--accent);text-decoration:none;font-weight:500">Cari agent →</a>
        </div>
      </div>`;
  }).join('');
}

/* ============ SUMMARIZE ROWS ============ */
function summarizeRows(rows) {
  if (!rows.length) return {};
  const numKeys = ['totalData','dataBaru','osDataBaru','dailyPayment','jmlDataBayar',
    'autocall','callManual','callTerhubung','sentuhWA','sentuhGojek','responWA','responGojek',
    'waBlokir','ptp','ptpBayar','sentuhWABA','responWABA','smsManual','responSMSManual','paymentOvertime'];
  const result = {};
  numKeys.forEach(k => { result[k] = rows.reduce((a, r) => a + (r[k] || 0), 0); });
  const totalBayar = result.jmlDataBayar;
  result.avgRate = totalBayar > 0
    ? rows.reduce((a, r) => a + (r.rate * r.jmlDataBayar), 0) / totalBayar
    : rows.reduce((a, r) => a + (r.rate || 0), 0) / rows.length;
  return result;
}

/* ============ RENDER WEEKLY ============ */
function renderWeekly(data, bulan, tahun) {
  if (!data || !data.success || !data.weekly) return;
  const weeks = data.weekly;
  const keys = Object.keys(weeks).sort();
  if (keys.length === 0) return;

  document.getElementById('weeklyLabel').textContent = bulan + ' ' + tahun;
  document.getElementById('weeklySection').style.display = 'block';

  const cols = ['dailyPayment','avgRate','jmlDataBayar','callManual','sentuhWA','ptp','ptpBayar'];
  const colLabels = { dailyPayment:'Payment', avgRate:'Rate', jmlDataBayar:'Data Bayar', callManual:'Call Manual', sentuhWA:'Sentuh WA', ptp:'PTP', ptpBayar:'PTP Bayar' };

  document.getElementById('weeklyHead').innerHTML = `<tr>
    <th>Minggu</th><th>Record</th>
    ${cols.map(c => `<th>${colLabels[c]}</th>`).join('')}
  </tr>`;

  document.getElementById('weeklyBody').innerHTML = keys.map(wk => {
    const s = weeks[wk];
    return `<tr>
      <td>${wk}</td>
      <td class="num">${fmtNum(s.totalRecord)}</td>
      ${cols.map(c => `<td class="num">${fmt(c, s[c])}</td>`).join('')}
    </tr>`;
  }).join('');
}

/* ============ SETUP MODAL ============ */
function openSetup(app) {
  currentSetupApp = app;
  currentSetupChecked = getSetup(app).slice();
  document.getElementById('modalTitle').textContent = 'Setup tampilan — ' + app;

  document.getElementById('modalBody').innerHTML = ALL_METRICS.map(m => `
    <label class="metric-toggle">
      <span class="metric-toggle-label">${m.label}</span>
      <input type="checkbox" value="${m.key}" ${currentSetupChecked.includes(m.key) ? 'checked' : ''}>
    </label>
  `).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentSetupApp = null;
}

function saveSetup() {
  const checks = document.querySelectorAll('#modalBody input[type=checkbox]:checked');
  const keys = Array.from(checks).map(c => c.value);
  if (keys.length === 0) { alert('Pilih minimal 1 metrik.'); return; }
  saveSetupApp(currentSetupApp, keys);
  closeModal();
  if (homeData && homeData.rows) {
    renderApps(homeData.rows, homeData.summary);
  }
}

// Tutup modal klik di luar
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ============ INIT ============ */
loadData();
</script>
